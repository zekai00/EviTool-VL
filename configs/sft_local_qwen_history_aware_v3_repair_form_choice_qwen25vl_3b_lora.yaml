### model
model_name_or_path: /root/models/Qwen2.5-VL-3B-Instruct
adapter_name_or_path: checkpoints/qwen25vl_3b_history_aware_sft_v3_1000_aug_lora
image_max_pixels: 262144
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all
freeze_vision_tower: true
early_stopping_steps: 2

### dataset
dataset_dir: /root/datasets/browser_rl/sft/local_qwen_history_aware_sft_v3_1000_aug_form_choice_repair_v1_20260528_1104
dataset: local_qwen_history_aware_sft_train
eval_dataset: local_qwen_history_aware_sft_val
template: qwen2_vl
cutoff_len: 4096
max_samples: 9010
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: checkpoints/qwen25vl_3b_history_aware_sft_v3_form_choice_repair_v1_lora
logging_steps: 10
save_steps: 100
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
max_steps: 240
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
